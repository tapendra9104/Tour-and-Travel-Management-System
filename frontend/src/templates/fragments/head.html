<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
          content="Explore the world with curated tour packages, seamless booking, and unforgettable travel experiences.">
    <meta th:if="${_csrf != null}" name="_csrf" th:content="${_csrf.token}">
    <meta th:if="${_csrf != null}" name="_csrf_header" th:content="${_csrf.headerName}">
    <title th:text="${title} + ' | Wanderlust Travels'">Wanderlust Travels</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap"
          rel="stylesheet">
    <link rel="icon" th:href="@{/icon-light-32x32.png}" sizes="32x32">
    <link rel="apple-touch-icon" th:href="@{/apple-icon.png}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script defer th:src="@{/js/site.js}"></script>
</head>
</html>
