<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="siteHeader" class="site-header sticky top-0 z-50 w-full border-b border-border/40 bg-background/95 backdrop-blur supports-[backdrop-filter]:bg-background/60">
    <div class="container mx-auto flex h-16 items-center justify-between px-4">
        <a th:href="${isAdmin} ? @{/admin} : @{/}" class="flex items-center gap-2">
            <svg class="h-7 w-7 text-primary" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                 stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M10 20a7.967 7.967 0 0 1-5-2l-3-3 3-3a7.967 7.967 0 0 1 5-2h4a7.967 7.967 0 0 1 5 2l3 3-3 3a7.967 7.967 0 0 1-5 2z"></path>
                <path d="M10 12V4l4 4"></path>
            </svg>
            <span class="text-xl font-semibold tracking-tight">Wanderlust</span>
        </a>

        <nav class="hidden md:flex items-center gap-8">
            <a th:if="${!isAdmin}" th:href="@{/}" class="text-sm font-medium transition-colors hover:text-foreground"
               th:classappend="${currentPage == 'home'} ? ' text-foreground' : ' text-muted-foreground'">Home</a>
            <a th:if="${!isAdmin}" th:href="@{/tours}" class="text-sm font-medium transition-colors hover:text-foreground"
               th:classappend="${currentPage == 'tours'} ? ' text-foreground' : ' text-muted-foreground'">Tours</a>
            <a th:if="${!isAdmin}" th:href="@{/destinations}" class="text-sm font-medium transition-colors hover:text-foreground"
               th:classappend="${currentPage == 'destinations'} ? ' text-foreground' : ' text-muted-foreground'">Destinations</a>
            <a th:if="${!isAdmin}" th:href="@{/about}" class="text-sm font-medium transition-colors hover:text-foreground"
               th:classappend="${currentPage == 'about'} ? ' text-foreground' : ' text-muted-foreground'">About</a>
            <a th:if="${!isAdmin}" th:href="@{/contact}" class="text-sm font-medium transition-colors hover:text-foreground"
               th:classappend="${currentPage == 'contact'} ? ' text-foreground' : ' text-muted-foreground'">Contact</a>
            <a th:if="${isAdmin}" th:href="@{/admin}" class="text-sm font-medium transition-colors hover:text-foreground"
               th:classappend="${currentPage == 'admin'} ? ' text-foreground text-primary' : ' text-primary'">Admin</a>
        </nav>

        <div class="hidden md:flex items-center gap-3">
            <a th:if="${!isAdmin}" th:href="@{/dashboard}" class="inline-flex">
                <span class="inline-flex h-9 items-center justify-center gap-2 rounded-md px-4 text-sm font-medium transition-colors hover:bg-secondary">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                         stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M8 2v4"></path>
                        <path d="M16 2v4"></path>
                        <rect x="3" y="4" width="18" height="18" rx="2"></rect>
                        <path d="M3 10h18"></path>
                    </svg>
                    My Bookings
                </span>
            </a>
            <a th:if="${isAuthenticated}" th:href="@{/profile}" class="inline-flex h-9 items-center justify-center gap-2 rounded-md px-3 text-sm font-medium transition-colors hover:bg-secondary" title="My Profile">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                     stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                Profile
            </a>
            <a th:if="${!isAuthenticated}" th:href="@{/login}" class="inline-flex h-9 items-center justify-center gap-2 rounded-md bg-primary px-4 text-sm font-medium text-primary-foreground shadow-sm transition-colors hover:bg-primary/90">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                     stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                Sign In
            </a>
            <div th:if="${isAuthenticated}" class="flex items-center gap-3">
                <span class="text-sm font-medium text-muted-foreground" th:text="${currentUserName}">Traveler</span>
                <form th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="inline-flex h-9 items-center justify-center gap-2 rounded-md bg-primary px-4 text-sm font-medium text-primary-foreground shadow-sm transition-colors hover:bg-primary/90">
                        Sign Out
                    </button>
                </form>
            </div>
        </div>

        <button type="button" class="inline-flex h-10 w-10 items-center justify-center rounded-md md:hidden hover:bg-secondary"
                data-sheet-trigger="mobile-nav" aria-label="Toggle menu">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                 stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 12h16"></path>
                <path d="M4 6h16"></path>
                <path d="M4 18h16"></path>
            </svg>
        </button>
    </div>

    <div class="mobile-sheet fixed inset-0 z-[60] hidden" data-sheet="mobile-nav" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Mobile navigation">
        <div class="absolute inset-0 bg-black/50" data-sheet-close></div>
        <div class="mobile-sheet-panel absolute right-0 top-0 h-full translate-x-full overflow-y-auto bg-background p-6 shadow-xl transition-transform duration-300" data-sheet-panel>
            <div class="flex items-center justify-between">
                <a th:href="${isAdmin} ? @{/admin} : @{/}" class="flex items-center gap-2">
                    <svg class="h-6 w-6 text-primary" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                         stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M10 20a7.967 7.967 0 0 1-5-2l-3-3 3-3a7.967 7.967 0 0 1 5-2h4a7.967 7.967 0 0 1 5 2l3 3-3 3a7.967 7.967 0 0 1-5 2z"></path>
                        <path d="M10 12V4l4 4"></path>
                    </svg>
                    <span class="text-lg font-semibold">Wanderlust</span>
                </a>
                <button type="button" class="inline-flex h-10 w-10 items-center justify-center rounded-md hover:bg-secondary" data-sheet-close aria-label="Close menu">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                         stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M18 6 6 18"></path>
                        <path d="m6 6 12 12"></path>
                    </svg>
                </button>
            </div>

            <nav class="mt-8 flex flex-col gap-4">
                <a th:if="${!isAdmin}" th:href="@{/}" class="text-base font-medium text-muted-foreground transition-colors hover:text-foreground">Home</a>
                <a th:if="${!isAdmin}" th:href="@{/tours}" class="text-base font-medium text-muted-foreground transition-colors hover:text-foreground">Tours</a>
                <a th:if="${!isAdmin}" th:href="@{/destinations}" class="text-base font-medium text-muted-foreground transition-colors hover:text-foreground">Destinations</a>
                <a th:if="${!isAdmin}" th:href="@{/about}" class="text-base font-medium text-muted-foreground transition-colors hover:text-foreground">About</a>
                <a th:if="${!isAdmin}" th:href="@{/contact}" class="text-base font-medium text-muted-foreground transition-colors hover:text-foreground">Contact</a>
                <a th:if="${isAdmin}" th:href="@{/admin}" class="text-base font-semibold text-primary transition-colors hover:text-foreground">Admin Panel</a>
            </nav>

            <div class="mt-8 flex flex-col gap-3">
                <a th:if="${!isAdmin}" th:href="@{/dashboard}" class="inline-flex h-10 items-center justify-center gap-2 rounded-md border border-border px-4 text-sm font-medium">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                         stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M8 2v4"></path>
                        <path d="M16 2v4"></path>
                        <rect x="3" y="4" width="18" height="18" rx="2"></rect>
                        <path d="M3 10h18"></path>
                    </svg>
                    My Bookings
                </a>
                <a th:if="${isAuthenticated}" th:href="@{/profile}" class="inline-flex h-10 items-center justify-center gap-2 rounded-md border border-border px-4 text-sm font-medium">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                         stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    My Profile
                </a>
                <a th:if="${!isAuthenticated}" th:href="@{/login}" class="inline-flex h-10 items-center justify-center gap-2 rounded-md bg-primary px-4 text-sm font-medium text-primary-foreground">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                         stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    Sign In
                </a>
                <form th:if="${isAuthenticated}" th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="inline-flex h-10 w-full items-center justify-center gap-2 rounded-md bg-primary px-4 text-sm font-medium text-primary-foreground">
                        Sign Out
                    </button>
                </form>
            </div>
        </div>
    </div>
</header>
</body>
</html>
