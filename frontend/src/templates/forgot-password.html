<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${pageTitle})}"></head>
<body class="font-sans antialiased">
<div class="min-h-screen flex flex-col">
    <header th:replace="~{fragments/header :: siteHeader}"></header>

    <main class="flex-1 bg-secondary/30">
        <div class="container mx-auto px-4 py-16">
            <div class="mx-auto max-w-md rounded-2xl bg-card p-8 shadow-sm">
                <div class="mb-8 text-center">
                    <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-full bg-primary/10">
                        <svg class="h-7 w-7 text-primary" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                            <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                        </svg>
                    </div>
                    <h1 class="text-3xl font-bold">Reset Password</h1>
                    <p class="mt-2 text-muted-foreground">Enter your email and we'll send you a reset link.</p>
                </div>

                <!-- Success state -->
                <div th:if="${submitted}" class="rounded-xl bg-green-50 p-6 text-center">
                    <svg class="mx-auto mb-3 h-10 w-10 text-green-600" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M22 12a10 10 0 1 1-4-8"></path>
                        <path d="m9 11 3 3L22 4"></path>
                    </svg>
                    <h2 class="mb-2 text-lg font-semibold text-green-800">Check your inbox</h2>
                    <p class="text-sm text-green-700">
                        If an account exists for that email, we've sent a reset link valid for 60 minutes.
                        Check your spam folder if you don't see it.
                    </p>
                    <a th:href="@{/login}" class="mt-4 inline-flex h-10 items-center justify-center rounded-lg bg-primary px-4 text-sm font-medium text-primary-foreground transition-colors hover:bg-primary/90">
                        Back to Sign In
                    </a>
                </div>

                <!-- Form state (submitted is null on GET, true only after POST) -->
                <form th:if="${submitted != true}" th:action="@{/forgot-password}" method="post" class="space-y-4" th:object="${forgotForm}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="space-y-2">
                        <label for="fp-email" class="text-sm font-medium">Email address</label>
                        <input id="fp-email" type="email" name="email" th:field="*{email}"
                               placeholder="you@example.com" autocomplete="email"
                               class="h-11 w-full rounded-lg border border-border bg-background px-4 focus:outline-none focus:ring-2 focus:ring-primary">
                        <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-xs text-destructive"></p>
                    </div>
                    <button type="submit" class="inline-flex h-11 w-full items-center justify-center rounded-lg bg-primary px-4 text-base font-medium text-primary-foreground transition-colors hover:bg-primary/90">
                        Send Reset Link
                    </button>
                </form>

                <p class="mt-6 text-center text-sm text-muted-foreground">
                    <a th:href="@{/login}" class="font-medium text-primary hover:underline">&larr; Back to Sign In</a>
                </p>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: siteFooter}"></footer>
</div>
</body>
</html>
