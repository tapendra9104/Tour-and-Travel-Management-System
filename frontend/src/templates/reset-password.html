<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${pageTitle})}"></head>
<body class="font-sans antialiased">
<div class="min-h-screen flex flex-col">
    <header th:replace="~{fragments/header :: siteHeader}"></header>

    <main class="flex-1 bg-secondary/30">
        <div class="container mx-auto px-4 py-16">
            <div class="mx-auto max-w-md rounded-2xl bg-card p-8 shadow-sm">
                <div class="mb-8 text-center">
                    <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-full bg-primary/10">
                        <svg class="h-7 w-7 text-primary" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </div>
                    <h1 class="text-3xl font-bold">Set New Password</h1>
                    <p class="mt-2 text-muted-foreground">Choose a strong password for your account.</p>
                </div>

                <!-- Invalid/expired token -->
                <div th:if="${invalidToken == true}" class="rounded-xl bg-destructive/10 p-6 text-center">
                    <p class="mb-4 text-sm text-destructive">This reset link is invalid or has expired.</p>
                    <a th:href="@{/forgot-password}" class="inline-flex h-10 items-center justify-center rounded-lg bg-primary px-4 text-sm font-medium text-primary-foreground transition-colors hover:bg-primary/90">
                        Request a New Link
                    </a>
                </div>

                <!-- Valid token: show form -->
                <form th:if="${invalidToken != true}" th:action="@{/reset-password}" method="post" class="space-y-4" th:object="${resetForm}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="token" th:value="${token}">

                    <div th:if="${resetError}" class="rounded-lg bg-destructive/10 p-3 text-sm text-destructive" th:text="${resetError}"></div>

                    <div class="space-y-2">
                        <label for="rp-password" class="text-sm font-medium">New Password</label>
                        <input id="rp-password" type="password" name="password" th:field="*{password}"
                               placeholder="At least 8 characters" autocomplete="new-password"
                               class="h-11 w-full rounded-lg border border-border bg-background px-4 focus:outline-none focus:ring-2 focus:ring-primary">
                        <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-xs text-destructive"></p>
                        <p class="text-xs text-muted-foreground">Must include uppercase, lowercase, and a number.</p>
                    </div>

                    <div class="space-y-2">
                        <label for="rp-confirm" class="text-sm font-medium">Confirm Password</label>
                        <input id="rp-confirm" type="password" name="confirmPassword" th:field="*{confirmPassword}"
                               placeholder="Repeat your new password" autocomplete="new-password"
                               class="h-11 w-full rounded-lg border border-border bg-background px-4 focus:outline-none focus:ring-2 focus:ring-primary">
                        <p th:if="${confirmError}" th:text="${confirmError}" class="text-xs text-destructive"></p>
                    </div>

                    <button type="submit" class="inline-flex h-11 w-full items-center justify-center rounded-lg bg-primary px-4 text-base font-medium text-primary-foreground transition-colors hover:bg-primary/90">
                        Reset Password
                    </button>
                </form>

                <p class="mt-6 text-center text-sm text-muted-foreground">
                    <a th:href="@{/login}" class="font-medium text-primary hover:underline">&larr; Back to Sign In</a>
                </p>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: siteFooter}"></footer>
</div>
</body>
</html>
