# Base configuration. Sensitive values are loaded from environment variables.
# See .env.example for the full list of supported variables.

spring.application.name=wanderlust-travels
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/wanderlust?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:wanderlust}
spring.datasource.password=${DB_PASSWORD:wanderlust}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
# open-in-view is explicitly disabled to prevent implicit transactions during rendering.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jackson.serialization.write-dates-as-timestamps=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# Thymeleaf
spring.thymeleaf.cache=false

# Mail. Notifications are still stored when SMTP is not configured.
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:5000}

# Session
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict

# Payments
app.payments.currency=${PAYMENT_CURRENCY:USD}
app.payments.deposit-rate=${PAYMENT_DEPOSIT_RATE:0.30}
app.payments.full-payment-window-days=${PAYMENT_FULL_WINDOW_DAYS:45}
app.payments.balance-due-days-before-departure=${PAYMENT_BALANCE_DUE_DAYS:21}
# Payment gateway: 'sandbox' (default) processes payments with a local stub.
# Set to 'stripe' and configure STRIPE_SECRET_KEY to use real Stripe processing.
app.payments.gateway=${PAYMENT_GATEWAY:sandbox}

# Notifications
app.notifications.from-email=${MAIL_FROM:noreply@wanderlust.com}
app.notifications.admin-email=${ADMIN_EMAIL:admin@wanderlust.com}
app.notifications.support-email=${SUPPORT_EMAIL:hello@wanderlust.com}
app.notifications.brand-name=Wanderlust Travels
app.notifications.base-url=${APP_BASE_URL:http://localhost:8080}
app.notifications.automation-cron=${APP_NOTIFICATIONS_AUTOMATION_CRON:0 0 8 * * *}
app.notifications.payment-reminder-lead-days=${APP_NOTIFICATIONS_PAYMENT_REMINDER_LEAD_DAYS:2}

# Local seed users. Production overrides remove default passwords.
app.seed.admin.enabled=${SEED_ADMIN_ENABLED:true}
app.seed.admin.email=${SEED_ADMIN_EMAIL:admin@wanderlust.com}
app.seed.admin.password=${SEED_ADMIN_PASSWORD:Admin@123}
app.seed.admin.name=${SEED_ADMIN_NAME:Wanderlust Admin}
app.seed.traveler.enabled=${SEED_TRAVELER_ENABLED:true}
app.seed.traveler.email=${SEED_TRAVELER_EMAIL:traveler@wanderlust.com}
app.seed.traveler.password=${SEED_TRAVELER_PASSWORD:Traveler@123}
app.seed.traveler.name=${SEED_TRAVELER_NAME:Demo Traveler}
app.demo-credentials.enabled=${DEMO_CREDENTIALS_ENABLED:true}

# Health and errors
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
server.error.whitelabel.enabled=false

# Swagger UI / OpenAPI - available at /swagger-ui.html (admin users only in prod)
# Disable entirely in production by setting SPRINGDOC_ENABLED=false
springdoc.api-docs.enabled=${SPRINGDOC_ENABLED:true}
springdoc.swagger-ui.enabled=${SPRINGDOC_ENABLED:true}
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.packages-to-scan=com.toursim.management.web
