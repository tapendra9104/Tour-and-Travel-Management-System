# Production overrides. Active when spring.profiles.active=prod.

# No SQL logging in production
spring.jpa.show-sql=false

# Cache compiled Thymeleaf templates
spring.thymeleaf.cache=true

# Never expose stack traces to end users
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-exception=false

# Enforce secure cookies and proxy-aware request URLs
server.servlet.session.cookie.secure=true
server.forward-headers-strategy=framework

# Conservative logging
logging.level.root=WARN
logging.level.com.toursim.management=INFO

# Do not expose health internals in production.
management.endpoint.health.show-details=never

# Never seed demo credentials in production. Set SEED_ADMIN_PASSWORD to create
# an initial admin on a fresh database, or create admins manually.
app.seed.admin.password=${SEED_ADMIN_PASSWORD:}
app.seed.traveler.enabled=false
app.seed.traveler.password=${SEED_TRAVELER_PASSWORD:}
app.demo-credentials.enabled=false

# JSON structured logging for log aggregation.
logging.structured.format.console=ecs
