# Local development overrides. Active when spring.profiles.active=dev.

# Verbose SQL for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Hot-reload templates
spring.thymeleaf.cache=false

# Detailed error pages
server.error.include-stacktrace=always
server.error.include-message=always

# Keep Flyway strict locally so production migration issues surface early.
spring.flyway.out-of-order=false

logging.level.com.toursim.management=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.cache=TRACE
