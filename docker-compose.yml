services:
  mysql:
    image: mysql:8.4
    container_name: wanderlust-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: wanderlust
      MYSQL_USER: wanderlust
      MYSQL_PASSWORD: wanderlust
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
