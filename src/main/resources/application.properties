spring.application.name=wanderlust-travels
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/wanderlust?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:wanderlust}
spring.datasource.password=${DB_PASSWORD:wanderlust}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jackson.serialization.write-dates-as-timestamps=false
spring.thymeleaf.cache=false
spring.flyway.baseline-on-migrate=true
server.error.whitelabel.enabled=false
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:5000}
app.notifications.from-email=${APP_NOTIFICATIONS_FROM_EMAIL:no-reply@wanderlust.local}
app.notifications.admin-email=${APP_NOTIFICATIONS_ADMIN_EMAIL:admin@wanderlust.com}
app.notifications.brand-name=${APP_NOTIFICATIONS_BRAND_NAME:Wanderlust Travels}
app.notifications.support-email=${APP_NOTIFICATIONS_SUPPORT_EMAIL:hello@wanderlust.com}
app.notifications.base-url=${APP_NOTIFICATIONS_BASE_URL:http://localhost:8080}
app.notifications.automation-cron=${APP_NOTIFICATIONS_AUTOMATION_CRON:0 0 8 * * *}
app.notifications.payment-reminder-lead-days=${APP_NOTIFICATIONS_PAYMENT_REMINDER_LEAD_DAYS:2}
app.payments.currency=${APP_PAYMENTS_CURRENCY:USD}
app.payments.deposit-rate=${APP_PAYMENTS_DEPOSIT_RATE:0.30}
app.payments.full-payment-window-days=${APP_PAYMENTS_FULL_PAYMENT_WINDOW_DAYS:45}
app.payments.balance-due-days-before-departure=${APP_PAYMENTS_BALANCE_DUE_DAYS_BEFORE_DEPARTURE:21}
