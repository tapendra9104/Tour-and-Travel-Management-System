projects:
  - name: Wanderlust Travels
    environments:
      - name: Production
        services:
          - type: web
            name: wanderlust-travels
            runtime: docker
            plan: starter
            region: oregon
            branch: main
            autoDeployTrigger: commit
            dockerfilePath: ./backend/Dockerfile
            dockerContext: .
            buildFilter:
              paths:
                - backend/**
                - frontend/**
                - pom.xml
                - render.yaml
                - .dockerignore
            envVars:
              - key: SPRING_PROFILES_ACTIVE
                value: prod
              - key: DB_URL
                value: jdbc:mysql://wanderlust-mysql:3306/wanderlust?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
              - key: DB_USERNAME
                value: wanderlust
              - key: DB_PASSWORD
                fromService:
                  name: wanderlust-mysql
                  type: pserv
                  envVarKey: MYSQL_PASSWORD
              - key: APP_BASE_URL
                sync: false
              - key: ADMIN_EMAIL
                value: admin@wanderlust.com
              - key: SUPPORT_EMAIL
                value: hello@wanderlust.com
              - key: MAIL_FROM
                value: no-reply@wanderlust.com
              - key: SEED_ADMIN_EMAIL
                value: admin@wanderlust.com
              - key: SEED_ADMIN_PASSWORD
                sync: false
              - key: SEED_ADMIN_NAME
                value: Wanderlust Admin
              - key: MAIL_HOST
                sync: false
              - key: MAIL_PORT
                value: "587"
              - key: MAIL_USERNAME
                sync: false
              - key: MAIL_PASSWORD
                sync: false

          - type: pserv
            name: wanderlust-mysql
            runtime: image
            plan: starter
            region: oregon
            autoDeployTrigger: off
            image:
              url: docker.io/library/mysql:8.4
            envVars:
              - key: MYSQL_DATABASE
                value: wanderlust
              - key: MYSQL_USER
                value: wanderlust
              - key: MYSQL_PASSWORD
                sync: false
              - key: MYSQL_ROOT_PASSWORD
                sync: false
            disk:
              name: mysql-data
              mountPath: /var/lib/mysql
              sizeGB: 10
